<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM — Student Activity Monitoring | GCE Erode</title>
    <meta name="description" content="SAM Platform — Student Activity Monitoring for Government College of Engineering, Erode. Team-based academic mentorship, grading, and session management.">
    <meta name="theme-color" content="#0a0f1e">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

<!-- ── Splash Screen ───────────────────────────────────────── -->
<div id="splash-screen">
    <div class="splash-content">
        <div class="splash-logo">
            <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="30" cy="30" r="28" stroke="url(#sg)" stroke-width="2"/>
                <path d="M20 38 L30 22 L40 38" stroke="url(#sg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M23 34 H37" stroke="url(#sg)" stroke-width="2" stroke-linecap="round"/>
                <defs>
                    <linearGradient id="sg" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <div class="splash-title">SAM</div>
        <div class="splash-sub">Student Activity Monitoring</div>
        <div class="splash-loader">
            <div class="splash-bar"></div>
        </div>
    </div>
</div>

<!-- ── Toast Container ────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Sidebar Navigation ─────────────────────────────────── -->
<aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <svg viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="19" stroke="url(#sl)" stroke-width="1.5"/>
                <path d="M13 26 L20 14 L27 26" stroke="url(#sl)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M15.5 22.5 H24.5" stroke="url(#sl)" stroke-width="1.5" stroke-linecap="round"/>
                <defs>
                    <linearGradient id="sl" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
            </svg>
            <div>
                <div class="sidebar-logo-title">SAM</div>
                <div class="sidebar-logo-sub">GCE Erode</div>
            </div>
        </div>
        <button class="sidebar-close" onclick="toggleSidebar()" id="sidebar-close-btn" aria-label="Close sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <nav class="sidebar-nav">
        <div class="sidebar-section-label">Navigation</div>
        <a class="sidebar-item active" onclick="navigateTo('college'); closeSidebarOnMobile();" id="nav-home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
        </a>
        <a class="sidebar-item" onclick="navigateTo('sac'); closeSidebarOnMobile();" id="nav-sac">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            SAC Coordinators
        </a>

        <div class="sidebar-section-label">Authentication</div>
        <div id="sidebar-auth-buttons">
            <button class="sidebar-item" onclick="openLoginModal('Student')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Student Login
            </button>
            <button class="sidebar-item" onclick="openLoginModal('Alumni')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Alumni Login
            </button>
            <button class="sidebar-item" onclick="openLoginModal('Faculty')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Faculty Login
            </button>
            <button class="sidebar-item" onclick="openLoginModal('HOD')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                HOD Login
            </button>
            <button class="sidebar-item" onclick="openLoginModal('Admin')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                Admin Login
            </button>
        </div>
        <button class="sidebar-item danger" id="logout-btn" onclick="logout()" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </button>

        <div class="sidebar-section-label">System</div>
        <div class="sidebar-user-card" id="sidebar-user-card">
            <div class="user-avatar">?</div>
            <div>
                <div class="user-name" id="sidebar-user-name">Not logged in</div>
                <div class="user-role" id="sidebar-user-role">Guest</div>
            </div>
        </div>
    </nav>
</aside>

<!-- ── Sidebar Overlay ─────────────────────────────────────── -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ── Main Layout ────────────────────────────────────────── -->
<div class="app-layout">

    <!-- ── Top Header ─────────────────────────────────────── -->
    <header class="app-header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()" aria-label="Open menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="header-brand">
                <span class="header-brand-title">SAM</span>
                <span class="header-brand-sep">·</span>
                <span class="header-brand-sub">GCE Erode</span>
            </div>
        </div>
        <div class="header-center">
            <nav class="breadcrumb" id="nav-breadcrumb"></nav>
        </div>
        <div class="header-right">
            <div class="user-pill" id="user-badge" style="display:none;"></div>
            
            <button class="header-btn" onclick="navigateTo('college')" title="Institution Dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Dashboard
            </button>

            <div class="dropdown" id="login-dropdown-container" style="position:relative;">
                <button class="header-btn header-btn-primary" id="login-dropdown-btn" onclick="toggleRoleDropdown(event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Login As
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;margin-left:4px;"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="dropdown-menu" id="role-dropdown" style="display:none;">
                    <button class="dropdown-item" onclick="openLoginModal('Student')">Student</button>
                    <button class="dropdown-item" onclick="openLoginModal('Alumni')">Alumni</button>
                    <button class="dropdown-item" onclick="openLoginModal('Faculty')">Faculty</button>
                    <button class="dropdown-item" onclick="openLoginModal('HOD')">Head of Department (HOD)</button>
                    <button class="dropdown-item" onclick="openLoginModal('Admin')">Principal / Admin</button>
                </div>
            </div>

            <button class="header-btn header-btn-danger" id="logout-btn-header" onclick="logout()" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </button>
        </div>
    </header>

    <!-- ── Page Content ───────────────────────────────────── -->
    <main class="page-content" id="main-content">
        <!-- Dynamically rendered by app.js -->
    </main>
    
    <!-- ── Floating AI Chatbot ─────────────────────────────── -->
    <div id="ai-chat-bubble" onclick="toggleAIChat()" style="position:fixed; bottom:30px; right:30px; width:60px; height:60px; background:linear-gradient(135deg, #6366f1, #06b6d4); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 10px 25px rgba(99,102,241,0.4); z-index:9999; animation: bounce 2s infinite;">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path></svg>
        <div id="ai-chat-dot" style="position:absolute; top:5px; right:5px; width:12px; height:12px; background:#10b981; border:2px solid #fff; border-radius:50%;"></div>
    </div>

    <div id="ai-chat-window" style="position:fixed; bottom:110px; right:30px; width:380px; height:500px; background:#fff; border-radius:20px; display:none; flex-direction:column; box-shadow:0 20px 50px rgba(0,0,0,0.15); border:1px solid rgba(0,0,0,0.05); z-index:9999; overflow:hidden;">
        <div style="padding:1.5rem; background:linear-gradient(135deg, #6366f1, #06b6d4); color:#fff; display:flex; justify-content:space-between; align-items:center;">
             <div style="font-weight:800; display:flex; align-items:center; gap:8px;">
                 <div style="background:rgba(255,255,255,0.2); padding:6px; border-radius:8px;">🤖</div>
                 SAM AI Assistant
             </div>
             <button onclick="toggleAIChat()" style="background:none; border:none; color:#fff; cursor:pointer; font-size:1.2rem;">×</button>
        </div>
        <div id="ai-chat-messages" style="flex:1; padding:1rem; overflow-y:auto; background:#f9fafb; display:flex; flex-direction:column; gap:12px;">
             <!-- Messages will appear here -->
             <div style="background:#fff; border:1px solid #e5e7eb; padding:12px 16px; border-radius:12px; font-size:0.9rem; color:#374151; align-self:flex-start; max-width:85%;">
                  Hello! I'm SAM AI. I look after your academic security and help with career roadmaps. How's it going today? 😊
             </div>
        </div>
        <div style="padding:1rem; border-top:1px solid #e5e7eb; background:#fff; display:flex; gap:8px;">
             <input type="text" id="ai-chat-input" placeholder="Type your security or career question..." style="flex:1; border:1px solid #d1d5db; border-radius:10px; padding:10px 14px; font-size:0.85rem;" onkeydown="if(event.key==='Enter') sendAIChat()">
             <button onclick="sendAIChat()" style="background:var(--primary); color:#fff; border:none; border-radius:10px; padding:0 14px; cursor:pointer;">
                 <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
             </button>
        </div>
    </div>

</div>


<!-- ── Login Modal ────────────────────────────────────────── -->
<div id="admin-modal" class="modal-backdrop" style="display:none;" onclick="handleModalBackdropClick(event)">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div>
            <div>
                <div class="modal-title" id="login-modal-title">Login</div>
                <div class="modal-sub" id="login-modal-subtitle">Enter your credentials</div>
            </div>
            <button class="modal-close" onclick="closeAdminLogin()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div id="username-group" class="form-group" style="display:none; margin-bottom: 20px;">
                <label class="form-label" id="username-label">Username</label>
                <div class="input-wrap">
                    <input type="text" id="admin-username" class="form-input" placeholder="e.g. 23CSE12"
                        onkeydown="if(event.key==='Enter') document.getElementById('admin-password').focus()">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                    <input type="password" id="admin-password" class="form-input" placeholder="Enter password"
                        onkeydown="if(event.key==='Enter')attemptLogin()">
                    <button class="eye-btn" onclick="togglePwEye()" type="button" aria-label="Toggle visibility">
                        <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div id="login-error" class="form-error" style="display:none;"></div>
            </div>
            <button class="btn btn-primary w-full" onclick="attemptLogin()" id="login-submit-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Sign In
            </button>
        </div>
    </div>
</div>

<!-- ── Cycle Modal (dynamically appended by JS) ───────────── -->

<!-- ── Data Scripts ───────────────────────────────────────── -->
<script src="data/students_data.js"></script>
<script src="data/subjects_data.js"></script>
<script src="data/syllabus_details.js"></script>
<script src="data/ate_subjects.js"></script>
<script src="data/cse_subjects.js"></script>
<script src="data/cve_subjects.js"></script>
<script src="data/ece_subjects.js"></script>
<script src="data/eee_subjects.js"></script>
<script src="data/imt_subjects.js"></script>
<script src="data/mce_subjects.js"></script>
<script src="data/cds_subjects.js"></script>
<script src="data/sac_data.js"></script>
<script src="data/career_data.js"></script>
<script src="data/faculty_data.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/logic.js"></script>
<script src="js/ui.js"></script>
<script src="js/ai_agent.js"></script>
<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    window.TransformersAI = { pipeline };
    console.log('✅ Local browser AI (Transformers.js) initialized.');
</script>


</body>
</html>
